seed: 42

mosaic:
  n_mosaics: 3
  mean_diameters: [10.0, 12.0, 15.0]
  center_noise: 0.1
  diameter_noise: 0.1
  n_missing_list: 0
  overlap_factors: 1.1

features:
  type: gaussian
  n_dims: 2
  spread: 2.0
  std: [0.1, 0.5, 1.2]
  aspect_ratio: 1.0
  rotation: null
  center_jitter: 0.0

hull_features:
  enabled: false

output:
  filename: varied.npz
